<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>inVision U | AI анализ мотивационных писем</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      overflow: hidden;
    }
    .header {
      background: #1a1a2e;
      color: white;
      padding: 24px;
      text-align: center;
    }
    .header h1 {
      font-size: 28px;
      margin-bottom: 8px;
    }
    .header p {
      opacity: 0.8;
    }
    .content {
      padding: 24px;
    }
    textarea {
      width: 100%;
      height: 200px;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-family: inherit;
      font-size: 14px;
      resize: vertical;
    }
    textarea:focus {
      outline: none;
      border-color: #667eea;
    }
    button {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 12px 30px;
      border-radius: 25px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 15px;
      transition: transform 0.2s;
    }
    button:hover {
      transform: translateY(-2px);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #e0e0e0;
      vertical-align: top;
    }
    th {
      background: #f8f9fa;
      font-weight: 600;
      width: 200px;
    }
    .score {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-weight: bold;
      background: #d4edda;
      color: #155724;
    }
    .tag {
      display: inline-block;
      background: #e9ecef;
      padding: 4px 10px;
      border-radius: 15px;
      margin: 2px;
      font-size: 12px;
    }
    .loading {
      text-align: center;
      padding: 40px;
      display: none;
    }
    .note {
      background: #e7f3ff;
      border-left: 4px solid #667eea;
      padding: 12px;
      margin-top: 20px;
      font-size: 13px;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>inVision U</h1>
    <p>AI анализ мотивационных писем для поступления</p>
  </div>
  <div class="content">
    <textarea id="essay" placeholder="Вставьте текст мотивационного письма..."></textarea>
    <button onclick="analyze()"> Анализировать</button>

    <div id="loading" class="loading">
      <div>AI анализирует письмо...</div>
    </div>

    <div id="result"></div>
    <div class="note"> AI помогает анализировать. Решение принимает комиссия.</div>
  </div>
</div>

<script>
  async function analyze() {
    const essay = document.getElementById('essay').value;
    if (!essay.trim()) {
      alert('Введите текст письма');
      return;
    }

    document.getElementById('loading').style.display = 'block';
    document.getElementById('result').innerHTML = '';

    try {
      const res = await fetch('/api/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ essay: essay })
      });
      const data = await res.json();
      displayResult(data);
    } catch (err) {
      document.getElementById('result').innerHTML = `<div style="color:red;">Ошибка: ${err.message}</div>`;
    } finally {
      document.getElementById('loading').style.display = 'none';
    }
  }

  function formatList(arr) {
    if (!arr || arr.length === 0) return '—';
    return arr.map(item => `<span class="tag">${escapeHtml(item)}</span>`).join('');
  }

  function displayResult(d) {
    const html = `
            <table>
                <tr><th>ФИО</th><td><strong>${escapeHtml(d.name)}</strong></td></tr>
                <tr><th>Возраст</th><td>${d.age || 'не указан'}</td></tr>
                <tr><th>Образование</th><td>${escapeHtml(d.education)}</td></tr>
                <tr><th>Опыт</th><td>${escapeHtml(d.experience)}</td></tr>
                <tr><th>Мотивация</th><td><span class="score">${d.score || 0}</span> ${escapeHtml(d.motivation)}</td></tr>
                <tr><th>Навыки</th><td>${formatList(d.skills)}</td></tr>
                <tr><th>Soft skills</th><td>${formatList(d.soft_skills)}</td></tr>
                <tr><th>Достижения</th><td>${formatList(d.achievements)}</td></tr>
                <tr><th>Плюсы</th><td>${formatList(d.pros)}</td></tr>
                <tr><th>Минусы</th><td>${formatList(d.cons)}</td></tr>
                <tr><th>Вопросы для собеседования</th><td>${formatList(d.questions)}</td></tr>
                <tr><th>Рекомендация</th><td><strong>${escapeHtml(d.recommend)}</strong></td></tr>
            </table>
        `;
    document.getElementById('result').innerHTML = html;
  }

  function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }
</script>
</body>
</html>
